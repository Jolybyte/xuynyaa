<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>WebGL Voxel World</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Courier New', monospace;
            touch-action: none;
        }
        body.no-scroll {
            position: fixed;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 2px black;
        }
        #crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }
        #crosshair::after {
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }
        #stats {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.65);
            padding: 6px 12px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            color: #0f0;
            z-index: 20;
            pointer-events: none;
            border-left: 3px solid #0f0;
        }
        #debug-panel {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 8px 14px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            color: #ffaa66;
            z-index: 20;
            pointer-events: none;
            text-align: right;
            backdrop-filter: blur(4px);
            border-right: 2px solid #ffaa66;
        }
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            font-family: 'Segoe UI', sans-serif;
            backdrop-filter: blur(8px);
        }
        .menu-title {
            font-size: 70px;
            font-weight: 900;
            color: #ffcc44;
            text-shadow: 6px 6px 0 #8b5a2b;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }
        .menu-sub {
            color: #ddd;
            margin-bottom: 30px;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 40px;
        }
        #play-button {
            background: #5a9e4e;
            border: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
            padding: 12px 48px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #2e6b2a;
            margin-bottom: 30px;
            touch-action: manipulation;
        }
        #play-button:hover {
            background: #6fb85e;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #2e6b2a;
        }
        #play-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #2e6b2a;
        }
        .controls-info {
            color: #aaa;
            font-size: 14px;
            background: rgba(20,20,20,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            max-width: 500px;
            text-align: center;
            line-height: 1.5;
        }
        #hotbar {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(20,20,20,0.75);
            padding: 10px 18px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 50;
            pointer-events: auto;
        }
        .slot {
            width: 56px;
            height: 56px;
            background: #2c2c2c;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 black;
            transition: 0.1s linear;
            cursor: pointer;
            border: 2px solid #6a6a6a;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: manipulation;
        }
        .slot.active {
            border-color: #ffd966;
            transform: scale(1.08);
            box-shadow: 0 0 12px gold;
        }
        .slot[data-type="grass"] { background-image: url('./assets/grass.png'); }
        .slot[data-type="dirt"] { background-image: url('./assets/dirt.png'); }
        .slot[data-type="stone"] { background-image: url('./assets/stone.png'); }
        .slot[data-type="wood"] { background-image: url('./assets/wood.png'); }
        .slot[data-type="leaves"] { background-image: url('./assets/leaves.png'); }
        
        /* ========== МОБИЛЬНЫЕ УПРАВЛЕНИЯ ========== */
        #mobile-controls {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
        }
        #mobile-controls.active {
            display: block;
        }
        
        #joystick-zone {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
            touch-action: none;
        }
        #joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.9);
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease-out;
        }
        
        .action-btn {
            position: absolute;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: 3px solid rgba(255, 255, 255, 0.6);
            color: white;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
            transition: all 0.1s;
        }
        .action-btn:active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.92);
        }
        #jump-btn {
            bottom: 40px;
            right: 30px;
            background: rgba(100, 200, 100, 0.4);
            border-color: #7fcc7f;
        }
        #action-btn {
            bottom: 120px;
            right: 30px;
            background: rgba(200, 100, 100, 0.4);
            border-color: #cc7f7f;
            font-size: 11px;
        }
        #action-btn.place {
            background: rgba(100, 150, 200, 0.4);
            border-color: #7faacc;
        }
        
        #look-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
            touch-action: none;
            z-index: 1;
        }
        #look-zone.disabled {
            pointer-events: none;
        }
        
        #toggle-look {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 16px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            color: white;
            font-size: 12px;
            pointer-events: auto;
            z-index: 160;
            touch-action: manipulation;
        }
        
        @media (max-width: 700px), (hover: none) and (pointer: coarse) {
            .slot { width: 48px; height: 48px; font-size: 18px; }
            .menu-title { font-size: 48px; }
            #hotbar { bottom: 140px; }
        }
        
        @media (hover: hover) and (pointer: fine) {
            #mobile-controls { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="stats">FPS: <span id="fps-counter">0</span></div>
    <div id="debug-panel">
         Y: <span id="pos-y">0.00</span> |  VY: <span id="vel-y">0.00</span><br>
         Земля: <span id="ground-status"></span> |  Блок: <span id="cur-block">трава</span>
    </div>
    
    <div id="menu-overlay">
        <div class="menu-title">VOXEL WORLD</div>
        <button id="play-button">▶ ИГРАТЬ</button>
        <div class="controls-info">
            <strong>Управление:</strong><br>
            🖱️ ПК: ЛКМ/ПКМ — ломать/ставить • WASD — движение • Пробел — прыжок • 1-5 — блок
        </div>
    </div>
    
    <div id="hotbar">
        <div class="slot active" data-type="grass" title="1">🌿</div>
        <div class="slot" data-type="dirt" title="2">🟤</div>
        <div class="slot" data-type="stone" title="3">🪨</div>
        <div class="slot" data-type="wood" title="4">🪵</div>
        <div class="slot" data-type="leaves" title="5">🍃</div>
    </div>

    <!-- Мобильные элементы управления -->
    <div id="mobile-controls">
        <div id="joystick-zone">
            <div id="joystick-base"></div>
            <div id="joystick-knob"></div>
        </div>
        <div id="jump-btn" class="action-btn">ПРЫЖОК</div>
        <div id="action-btn" class="action-btn">ЛОМАТЬ</div>
        <button id="toggle-look">👁️ Обзор: ВКЛ</button>
        <div id="look-zone"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ========== ОПРЕДЕЛЕНИЕ УСТРОЙСТВА ==========
        function isMobileDevice() {
            return (
                /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                ('maxTouchPoints' in navigator && navigator.maxTouchPoints > 2) ||
                window.matchMedia('(hover: none) and (pointer: coarse)').matches
            );
        }
        
        const IS_MOBILE = isMobileDevice();
        const POINTER_LOCK_SUPPORTED = 'pointerLockElement' in document || 
                                       'mozPointerLockElement' in document || 
                                       'webkitPointerLockElement' in document;
        
        console.log(`📱 Мобильное: ${IS_MOBILE} | 🔐 PointerLock: ${POINTER_LOCK_SUPPORTED}`);

        // ========== НАСТРОЙКИ МИРА ==========
        const WORLD_RADIUS = IS_MOBILE ? 50 : 100;
        const MAX_INSTANCES = IS_MOBILE ? 50000 : 180000;
        const BLOCK_SIZE = 1;
        const TEXTURE_PATH = './assets/';
        
        const BLOCKS = {
            GRASS:  { id: 0, name: 'grass', texture: 'grass.png', color: 0x7cb55e },
            DIRT:   { id: 1, name: 'dirt',  texture: 'dirt.png',  color: 0xb87c4a },
            STONE:  { id: 2, name: 'stone', texture: 'stone.png', color: 0x8e9a9e },
            WOOD:   { id: 3, name: 'wood',  texture: 'wood.png',  color: 0xc28b5c },
            LEAVES: { id: 4, name: 'leaves',texture: 'leaves.png',color: 0x6aae5a }
        };
        
        let currentBlock = BLOCKS.GRASS;
        let gameActive = false;
        
        const worldMap = new Map();
        const instancedMeshes = {};
        const freeIdPools = {};
        const dummyMatrix = new THREE.Object3D();
        const boxGeo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        const textureLoader = new THREE.TextureLoader();
        const loadedTextures = {};
        
        Object.values(BLOCKS).forEach(block => {
            try {
                const texture = textureLoader.load(TEXTURE_PATH + block.texture);
                texture.magFilter = THREE.NearestFilter;
                texture.minFilter = THREE.NearestFilter;
                loadedTextures[block.name] = texture;
            } catch(e) {
                loadedTextures[block.name] = null;
            }
        });
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6bb5d9);
        scene.fog = new THREE.FogExp2(0x6bb5d9, IS_MOBILE ? 0.015 : 0.008);
        
        const camera = new THREE.PerspectiveCamera(
            IS_MOBILE ? 70 : 80, 
            window.innerWidth / window.innerHeight, 
            0.1, 
            IS_MOBILE ? 150 : 280
        );
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            powerPreference: IS_MOBILE ? 'low-power' : 'high-performance' 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = !IS_MOBILE;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_MOBILE ? 1.2 : 2));
        document.body.appendChild(renderer.domElement);
        
        const ambient = new THREE.AmbientLight(0xffffff, 0.65);
        scene.add(ambient);
        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        sunLight.position.set(35, 45, 20);
        sunLight.castShadow = !IS_MOBILE;
        if (!IS_MOBILE) {
            sunLight.shadow.mapSize.width = 1024;
            sunLight.shadow.mapSize.height = 1024;
        }
        scene.add(sunLight);
        
        Object.values(BLOCKS).forEach(block => {
            let material;
            const texture = loadedTextures[block.name];
            if (texture) {
                material = new THREE.MeshStandardMaterial({
                    map: texture, roughness: 0.7, metalness: 0.05
                });
            } else {
                material = new THREE.MeshStandardMaterial({
                    color: block.color, roughness: 0.6, metalness: 0.1
                });
            }
            const instMesh = new THREE.InstancedMesh(boxGeo, material, MAX_INSTANCES);
            instMesh.castShadow = !IS_MOBILE;
            instMesh.receiveShadow = !IS_MOBILE;
            instMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            scene.add(instMesh);
            instancedMeshes[block.name] = instMesh;
            freeIdPools[block.name] = Array.from({ length: MAX_INSTANCES }, (_, i) => i);
        });
        
        function addBlock(x, y, z, blockType) {
            const key = `${x},${y},${z}`;
            if (worldMap.has(key)) return false;
            const mesh = instancedMeshes[blockType.name];
            const pool = freeIdPools[blockType.name];
            if (!pool.length) return false;
            const instanceId = pool.pop();
            dummyMatrix.position.set(x + 0.5, y + 0.5, z + 0.5);
            dummyMatrix.updateMatrix();
            mesh.setMatrixAt(instanceId, dummyMatrix.matrix);
            mesh.instanceMatrix.needsUpdate = true;
            worldMap.set(key, { type: blockType.name, instanceId });
            return true;
        }
        
        function removeBlock(x, y, z) {
            const key = `${x},${y},${z}`;
            const data = worldMap.get(key);
            if (!data) return false;
            const mesh = instancedMeshes[data.type];
            dummyMatrix.position.set(0, -999, 0);
            dummyMatrix.scale.set(0, 0, 0);
            dummyMatrix.updateMatrix();
            mesh.setMatrixAt(data.instanceId, dummyMatrix.matrix);
            mesh.instanceMatrix.needsUpdate = true;
            freeIdPools[data.type].push(data.instanceId);
            worldMap.delete(key);
            return true;
        }
        
        function getBlockAt(x, y, z) {
            return worldMap.has(`${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`);
        }
        
        function getHeight(x, z) {
            const freq1 = 0.14, freq2 = 0.38;
            const y1 = Math.sin(x * freq1) * Math.cos(z * freq1) * 3.2;
            const y2 = Math.sin(x * freq2 + 1.2) * 1.8 + Math.cos(z * freq2 * 1.3) * 1.8;
            const hill = Math.max(0, Math.sin(x * 0.08) * Math.cos(z * 0.08) * 1.5);
            let base = Math.floor(4 + y1 + y2 * 0.8 + hill);
            return Math.max(2, Math.min(18, base));
        }
        
        function generateWorld() {
            const half = WORLD_RADIUS;
            for (let x = -half; x <= half; x++) {
                for (let z = -half; z <= half; z++) {
                    const height = getHeight(x, z);
                    for (let y = -3; y <= height; y++) {
                        let blockType = BLOCKS.STONE;
                        if (y === height) blockType = BLOCKS.GRASS;
                        else if (y > height - 3) blockType = BLOCKS.DIRT;
                        addBlock(x, y, z, blockType);
                    }
                    const treeChance = IS_MOBILE ? 0.005 : 0.020;
                    if (Math.random() < treeChance && Math.abs(x) < half-3 && Math.abs(z) < half-3) {
                        const treeH = 4 + Math.floor(Math.random() * 2);
                        const baseY = height + 1;
                        for (let h = 0; h < treeH; h++) addBlock(x, baseY + h, z, BLOCKS.WOOD);
                        const leafStart = baseY + treeH - 2;
                        for (let dy = -1; dy <= 2; dy++) {
                            const rad = dy === 2 ? 1 : (dy === -1 ? 1 : 2);
                            for (let dx = -rad; dx <= rad; dx++) {
                                for (let dz = -rad; dz <= rad; dz++) {
                                    if (Math.abs(dx) + Math.abs(dz) <= rad + 0.5 && !(dx === 0 && dz === 0 && dy === 0)) {
                                        const ly = leafStart + dy;
                                        if (ly > baseY && !getBlockAt(x + dx, ly, z + dz)) {
                                            addBlock(x + dx, ly, z + dz, BLOCKS.LEAVES);
                                        }
                                    }
                                }
                            }
                        }
                        addBlock(x, baseY + treeH, z, BLOCKS.LEAVES);
                    }
                }
            }
        }
        generateWorld();
        
        // Облака
        for (let i = 0; i < (IS_MOBILE ? 15 : 45); i++) {
            const cloudGroup = new THREE.Group();
            const cloudMat = new THREE.MeshBasicMaterial({ color: 0xf0f4fa, transparent: true, opacity: 0.7 });
            for (let p = 0; p < 2 + Math.floor(Math.random() * 3); p++) {
                const piece = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 1.6), cloudMat);
                piece.position.set((Math.random() - 0.5) * 1.8, (Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 1.8);
                cloudGroup.add(piece);
            }
            cloudGroup.position.set((Math.random() - 0.5) * 100, 24 + Math.random() * 8, (Math.random() - 0.5) * 90);
            scene.add(cloudGroup);
        }
        
        // Физика
        const PLAYER_WIDTH = 0.62, PLAYER_HEIGHT = 1.78, GRAVITY = 24.0, JUMP_POWER = 8.2;
        const WALK_SPEED = IS_MOBILE ? 4.5 : 5.6;
        const playerState = { velY: 0, grounded: false, jumpQueued: false };
        
        function checkCollision(posX, posY, posZ) {
            for (let bx = Math.floor(posX - PLAYER_WIDTH/2); bx <= Math.floor(posX + PLAYER_WIDTH/2); bx++)
                for (let by = Math.floor(posY - PLAYER_HEIGHT); by <= Math.floor(posY); by++)
                    for (let bz = Math.floor(posZ - PLAYER_WIDTH/2); bz <= Math.floor(posZ + PLAYER_WIDTH/2); bz++)
                        if (worldMap.has(`${bx},${by},${bz}`)) return true;
            return false;
        }
        
        function isGroundedTest(posX, posY, posZ) {
            const footY = posY - PLAYER_HEIGHT - 0.08;
            for (let [ox, oz] of [[0,0],[0.3,0],[-0.3,0],[0,0.3],[0,-0.3]])
                if (getBlockAt(posX + ox, footY, posZ + oz)) return true;
            return false;
        }
        
        // Управление
        const keys = { w:false, a:false, s:false, d:false };
        const pointerControls = new PointerLockControls(camera, document.body);
        camera.position.set(0, 28, 0);
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') keys.w = true;
            else if (e.code === 'KeyA') keys.a = true;
            else if (e.code === 'KeyS') keys.s = true;
            else if (e.code === 'KeyD') keys.d = true;
            else if (e.code === 'Space') { playerState.jumpQueued = true; e.preventDefault(); }
            else if (e.code === 'Digit1') { currentBlock = BLOCKS.GRASS; updateActiveSlot('grass'); }
            else if (e.code === 'Digit2') { currentBlock = BLOCKS.DIRT; updateActiveSlot('dirt'); }
            else if (e.code === 'Digit3') { currentBlock = BLOCKS.STONE; updateActiveSlot('stone'); }
            else if (e.code === 'Digit4') { currentBlock = BLOCKS.WOOD; updateActiveSlot('wood'); }
            else if (e.code === 'Digit5') { currentBlock = BLOCKS.LEAVES; updateActiveSlot('leaves'); }
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') keys.w = false;
            else if (e.code === 'KeyA') keys.a = false;
            else if (e.code === 'KeyS') keys.s = false;
            else if (e.code === 'KeyD') keys.d = false;
            else if (e.code === 'Space') { keys.spacePressed = false; playerState.jumpQueued = false; }
        });
        
        function updateActiveSlot(type) {
            document.querySelectorAll('.slot').forEach(el => {
                el.classList.toggle('active', el.dataset.type === type);
            });
            document.getElementById('cur-block').innerText = currentBlock.name;
        }
        
        document.querySelectorAll('.slot').forEach(slot => {
            slot.addEventListener('click', (e) => {
                e.stopPropagation();
                const type = slot.dataset.type;
                currentBlock = BLOCKS[type.toUpperCase()];
                updateActiveSlot(type);
            });
        });
        
        // ========== МОБИЛЬНОЕ УПРАВЛЕНИЕ ==========
        const mobileControls = {
            joystick: { active: false, startX: 0, startY: 0, moveVec: { x: 0, y: 0 } },
            look: { active: false, lastX: 0, lastY: 0 },
            actionMode: 'break',
            lookModeEnabled: true
        };
        
        if (IS_MOBILE) {
            const joystickZone = document.getElementById('joystick-zone');
            const joystickKnob = document.getElementById('joystick-knob');
            const jumpBtn = document.getElementById('jump-btn');
            const actionBtn = document.getElementById('action-btn');
            const lookZone = document.getElementById('look-zone');
            const toggleLookBtn = document.getElementById('toggle-look');
            const joystickMax = 35;
            
            // Джойстик
            joystickZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const t = e.touches[0], r = joystickZone.getBoundingClientRect();
                mobileControls.joystick.startX = r.left + r.width/2;
                mobileControls.joystick.startY = r.top + r.height/2;
                mobileControls.joystick.active = true;
                updateJoystick(t);
            }, { passive: false });
            
            joystickZone.addEventListener('touchmove', (e) => {
                if (mobileControls.joystick.active) {
                    e.preventDefault();
                    updateJoystick(e.touches[0]);
                }
            }, { passive: false });
            
            joystickZone.addEventListener('touchend', (e) => {
                e.preventDefault();
                mobileControls.joystick.active = false;
                mobileControls.joystick.moveVec = { x: 0, y: 0 };
                joystickKnob.style.transform = 'translate(-50%, -50%)';
            }, { passive: false });
            
            function updateJoystick(touch) {
                const dx = touch.clientX - mobileControls.joystick.startX;
                const dy = touch.clientY - mobileControls.joystick.startY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), joystickMax);
                const angle = Math.atan2(dy, dx);
                const mx = Math.cos(angle) * dist, my = Math.sin(angle) * dist;
                joystickKnob.style.transform = `translate(calc(-50% + ${mx}px), calc(-50% + ${my}px))`;
                mobileControls.joystick.moveVec = { x: mx/joystickMax, y: my/joystickMax };
            }
            
            // Поворот камеры
            lookZone.addEventListener('touchstart', (e) => {
                if (!mobileControls.lookModeEnabled) return;
                if (e.target.closest('.action-btn') || e.target.closest('#joystick-zone')) return;
                e.preventDefault();
                const t = e.touches[0];
                mobileControls.look.active = true;
                mobileControls.look.lastX = t.clientX;
                mobileControls.look.lastY = t.clientY;
            }, { passive: false });
            
            lookZone.addEventListener('touchmove', (e) => {
                if (!mobileControls.lookModeEnabled || !mobileControls.look.active) return;
                if (e.target.closest('.action-btn') || e.target.closest('#joystick-zone')) return;
                e.preventDefault();
                const t = e.touches[0];
                const dx = t.clientX - mobileControls.look.lastX;
                const dy = t.clientY - mobileControls.look.lastY;
                camera.rotation.y -= dx * 0.003;
                camera.rotation.x = Math.max(-Math.PI/2+0.1, Math.min(Math.PI/2-0.1, camera.rotation.x - dy * 0.003));
                mobileControls.look.lastX = t.clientX;
                mobileControls.look.lastY = t.clientY;
            }, { passive: false });
            
            lookZone.addEventListener('touchend', () => mobileControls.look.active = false, { passive: false });
            
            // Кнопки
            jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); playerState.jumpQueued = true; }, { passive: false });
            jumpBtn.addEventListener('touchend', (e) => { e.preventDefault(); playerState.jumpQueued = false; }, { passive: false });
            
            let longPressTimer = null;
            actionBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                longPressTimer = setTimeout(() => {
                    mobileControls.actionMode = mobileControls.actionMode === 'break' ? 'place' : 'break';
                    actionBtn.classList.toggle('place', mobileControls.actionMode === 'place');
                    actionBtn.textContent = mobileControls.actionMode === 'break' ? 'ЛОМАТЬ' : 'СТАВИТЬ';
                }, 400);
            }, { passive: false });
            actionBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                clearTimeout(longPressTimer);
                handleMobileAction();
            }, { passive: false });
            
            toggleLookBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                mobileControls.lookModeEnabled = !mobileControls.lookModeEnabled;
                lookZone.classList.toggle('disabled', !mobileControls.lookModeEnabled);
                toggleLookBtn.textContent = mobileControls.lookModeEnabled ? '👁️ Обзор: ВКЛ' : '👁️ Обзор: ВЫКЛ';
            });
            
            document.addEventListener('touchmove', (e) => { if (gameActive) e.preventDefault(); }, { passive: false });
        }
        
        // Raycast
        const highlightBox = new THREE.Mesh(
            new THREE.BoxGeometry(1.02, 1.02, 1.02),
            new THREE.MeshBasicMaterial({ color: 0xffcc44, wireframe: true, transparent: true, opacity: 0.75 })
        );
        scene.add(highlightBox);
        let currentHighlight = null;
        
        function raycastVoxel(origin, direction, maxDist = 6.5) {
            let [x, y, z] = [Math.floor(origin.x), Math.floor(origin.y), Math.floor(origin.z)];
            const [stepX, stepY, stepZ] = [Math.sign(direction.x), Math.sign(direction.y), Math.sign(direction.z)];
            const [tDX, tDY, tDZ] = [stepX ? Math.abs(1/direction.x) : Infinity, stepY ? Math.abs(1/direction.y) : Infinity, stepZ ? Math.abs(1/direction.z) : Infinity];
            let [nextX, nextY, nextZ] = [stepX > 0 ? x+1 : (stepX < 0 ? x : Infinity), stepY > 0 ? y+1 : (stepY < 0 ? y : Infinity), stepZ > 0 ? z+1 : (stepZ < 0 ? z : Infinity)];
            let [tMX, tMY, tMZ] = [stepX ? (nextX - origin.x)/direction.x : Infinity, stepY ? (nextY - origin.y)/direction.y : Infinity, stepZ ? (nextZ - origin.z)/direction.z : Infinity];
            if (stepX < 0) tMX = (origin.x - nextX)/-direction.x;
            if (stepY < 0) tMY = (origin.y - nextY)/-direction.y;
            if (stepZ < 0) tMZ = (origin.z - nextZ)/-direction.z;
            let face = new THREE.Vector3();
            for (let i = 0; i < maxDist * 2; i++) {
                if (worldMap.has(`${x},${y},${z}`)) return { x, y, z, face: face.clone() };
                if (tMX < tMY && tMX < tMZ) { x += stepX; tMX += tDX; face.set(-stepX, 0, 0); }
                else if (tMY < tMZ) { y += stepY; tMY += tDY; face.set(0, -stepY, 0); }
                else { z += stepZ; tMZ += tDZ; face.set(0, 0, -stepZ); }
            }
            return null;
        }
        
        function updateHighlight() {
            if (!gameActive) { highlightBox.visible = false; return; }
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            const hit = raycastVoxel(camera.position, dir, IS_MOBILE ? 4 : 7);
            if (hit) {
                highlightBox.position.set(hit.x + 0.5, hit.y + 0.5, hit.z + 0.5);
                highlightBox.visible = true;
                currentHighlight = hit;
            } else {
                highlightBox.visible = false;
                currentHighlight = null;
            }
        }
        
        function placeBlockAtHighlight() {
            if (!currentHighlight) return;
            const { x, y, z, face } = currentHighlight;
            const [nx, ny, nz] = [x + face.x, y + face.y, z + face.z];
            const [px, py, pz] = [camera.position.x, camera.position.y - PLAYER_HEIGHT + 0.5, camera.position.z];
            if (Math.abs(nx + 0.5 - px) > 0.65 || Math.abs(nz + 0.5 - pz) > 0.65 || Math.abs(ny + 0.5 - py) > 1.5) {
                addBlock(nx, ny, nz, currentBlock);
            }
        }
        
        function handleBuildDestroy(event) {
            if (!gameActive || IS_MOBILE || !currentHighlight) return;
            if (event.button === 0) removeBlock(currentHighlight.x, currentHighlight.y, currentHighlight.z);
            else if (event.button === 2) placeBlockAtHighlight();
        }
        
        function handleMobileAction() {
            if (!gameActive || !IS_MOBILE || !currentHighlight) return;
            if (mobileControls.actionMode === 'break') {
                removeBlock(currentHighlight.x, currentHighlight.y, currentHighlight.z);
            } else {
                placeBlockAtHighlight();
            }
        }
        
        window.addEventListener('mousedown', handleBuildDestroy);
        window.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // Движение
        let previousTime = performance.now();
        
        function updateMovement(deltaSec) {
            if (!gameActive) return;
            
            let [moveX, moveZ] = [0, 0];
            if (IS_MOBILE && mobileControls.joystick.active) {
                moveX = mobileControls.joystick.moveVec.x;
                moveZ = mobileControls.joystick.moveVec.y;
            } else {
                if (keys.w) moveZ -= 1; if (keys.s) moveZ += 1;
                if (keys.a) moveX -= 1; if (keys.d) moveX += 1;
            }
            
            if (moveX || moveZ) {
                const forward = new THREE.Vector3();
                camera.getWorldDirection(forward);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0));
                const moveDir = new THREE.Vector3().addScaledVector(forward, -moveZ).addScaledVector(right, moveX);
                if (moveDir.length() > 1) moveDir.normalize();
                const delta = moveDir.multiplyScalar(WALK_SPEED * deltaSec);
                const [newX, newZ] = [camera.position.x + delta.x, camera.position.z + delta.z];
                if (!checkCollision(newX, camera.position.y, camera.position.z)) camera.position.x = newX;
                if (!checkCollision(camera.position.x, camera.position.y, newZ)) camera.position.z = newZ;
            }
            
            playerState.velY -= GRAVITY * deltaSec;
            let newY = camera.position.y + playerState.velY * deltaSec;
            if (checkCollision(camera.position.x, newY, camera.position.z)) {
                if (playerState.velY < 0) {
                    camera.position.y = Math.floor(camera.position.y - PLAYER_HEIGHT) + 1 + PLAYER_HEIGHT;
                    playerState.velY = 0; playerState.grounded = true;
                } else if (playerState.velY > 0) {
                    camera.position.y = Math.ceil(camera.position.y) - 0.05;
                    playerState.velY = 0;
                }
            } else {
                camera.position.y = newY;
                playerState.grounded = false;
            }
            
            if (!playerState.grounded && playerState.velY <= 0.1 && isGroundedTest(camera.position.x, camera.position.y, camera.position.z)) {
                playerState.grounded = true; playerState.velY = 0;
            }
            if (playerState.jumpQueued && playerState.grounded) {
                playerState.velY = JUMP_POWER; playerState.grounded = false; playerState.jumpQueued = false;
            }
            if (camera.position.y < -10) { camera.position.set(0, 32, 0); playerState.velY = 0; }
            
            document.getElementById('pos-y').textContent = camera.position.y.toFixed(2);
            document.getElementById('vel-y').textContent = playerState.velY.toFixed(2);
            document.getElementById('ground-status').textContent = playerState.grounded ? '✅' : '⬇️';
        }
        
        // Запуск игры
        const menuDiv = document.getElementById('menu-overlay');
        const playBtn = document.getElementById('play-button');
        
        function startGame() {
            menuDiv.style.display = 'none';
            if (IS_MOBILE) document.body.classList.add('no-scroll');
            
            if (IS_MOBILE || !POINTER_LOCK_SUPPORTED) {
                console.log('📱 Мобильный режим');
                const mobileUI = document.getElementById('mobile-controls');
                if (mobileUI) mobileUI.classList.add('active');
                camera.position.set(0, 28, 0);
                camera.rotation.set(0, 0, 0);
                mobileControls.lookModeEnabled = true;
                const lookZone = document.getElementById('look-zone');
                if (lookZone) lookZone.classList.remove('disabled');
                gameActive = true;
            } else {
                console.log('🖥️ Десктопный режим');
                pointerControls.lock();
                gameActive = true;
            }
        }
        
        playBtn.addEventListener('click', startGame);
        playBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); }, { passive: false });
        
        pointerControls.addEventListener('lock', () => console.log('🔒 PointerLock активен'));
        pointerControls.addEventListener('unlock', () => {
            if (!IS_MOBILE) {
                menuDiv.style.display = 'flex';
                highlightBox.visible = false;
                gameActive = false;
                document.body.classList.remove('no-scroll');
            }
        });
        
        // Анимация
        let fpsCounter = 0, fpsTimer = 0;
        
        function animate() {
            const now = performance.now();
            const delta = Math.min(0.033, (now - previousTime) / 1000);
            previousTime = now;
            
            if (gameActive) {
                updateMovement(delta);
                updateHighlight();
            } else {
                highlightBox.visible = false;
            }
            
            fpsCounter++; fpsTimer += delta;
            if (fpsTimer >= 1) {
                document.getElementById('fps-counter').textContent = fpsCounter;
                fpsCounter = 0; fpsTimer = 0;
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        updateActiveSlot('grass');
        animate();
        console.log('🎮 Voxel World готов!');
    </script>
</body>
</html>
